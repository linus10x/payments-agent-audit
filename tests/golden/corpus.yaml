# GOLDEN payments corpus — real public matters of record, primary-sourced.
#
# Each entry maps a REAL enforcement action / litigation / incident to the
# control in this library that would have flagged or governed the failure mode.
# Matters of record ONLY — no invented allegations, amounts, or outcomes.
# Every entry carries a primary-source URL or is marked unverified: true.
# Provenance: docs/research/primary_source_research_2026-06-05.md
#
# control values map to assertions in test_golden_corpus.py:
#   ofac_screen           — a sanctioned name screens to POTENTIAL_MATCH (held)
#   sar_timeliness        — a late SAR filing fails the 30/60-day deadline
#   sar_disposition       — a vague alert-disposition rationale is rejected
#   reg_e                 — an extended Reg E investigation w/o provisional credit is non-compliant
#   irreversibility       — an instant-rail program on post-hoc veto only is refused A3/A4
#   sponsor_bank          — a BaaS program with unclear ledger ownership is non-attestable

